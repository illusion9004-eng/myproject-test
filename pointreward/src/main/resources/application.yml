spring:
  application:
    name: pointreward

  datasource:
    url: jdbc:mysql://localhost:3307/point_reward_db
    username: root
    password: 1234

    jpa:
      hibernate:
        ddl-auto: update
      show-sql: true
      properties:
        hibernate:
          format_sql: true

    logging:
      level:
        org:
          springframework:
            security: trace
